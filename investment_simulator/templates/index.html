<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Investimentos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <h1>Simulador de Investimentos</h1>

        <form id="form-investimento">
            <div class="form-group">
                <label>Valor Inicial (R$)</label>
                <input type="number" step="0.01" id="valor_inicial" required>
            </div>

            <div class="form-group">
                <label>Aporte Mensal (R$)</label>
                <input type="number" step="0.01" id="aporte_mensal" required>
            </div>

            <div class="form-group">
                <label>Taxa de Juros (% ao mês)</label>
                <input type="number" step="0.01" id="taxa_juros" required>
            </div>

            <div class="form-group">
                <label>Tempo (meses)</label>
                <input type="number" id="meses" required>
            </div>

            <button type="submit">Calcular</button>
        </form>

        <div class="resultado">
            <h2>Saldo Final:</h2>
            <p id="saldo_final">R$ 0,00</p>
        </div>

        <div class="grafico">
            <canvas id="graficoInvestimento"></canvas>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
